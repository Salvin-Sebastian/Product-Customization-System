services:
  # 1. Django Web Service + Combined Celery Worker
  - type: web
    name: product-customizer-web
    env: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: chmod +x start.sh && ./start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: product-customizer-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: product-customizer-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

  # 2. Redis Instance (Free Plan)
  - type: redis
    name: product-customizer-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic

databases:
  # 3. PostgreSQL Database (Free Plan)
  - name: product-customizer-db
    plan: free
